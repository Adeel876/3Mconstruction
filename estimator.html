<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Get instant construction cost estimate for your project in Freetown, Sierra Leone. Free online building cost calculator by 3M Construction.">
  <meta name="keywords" content="construction cost estimator Freetown, building cost calculator Sierra Leone, house construction cost">
  <title>Cost Estimator - 3M Construction Freetown</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">3M Construction</a>
      <ul class="navbar-nav ms-auto">
        <li><a class="nav-link" href="index.html">Home</a></li>
        <li><a class="nav-link" href="about.html">About</a></li>
        <li><a class="nav-link" href="services.html">Services</a></li>
        <li><a class="nav-link" href="projects.html">Projects</a></li>
        <li><a class="nav-link active" href="estimator.html">Cost Estimator</a></li>
      </ul>
    </div>
  </nav>

  <div class="container py-5">
    <h1 class="text-center mb-4">Project Cost Estimator</h1>
    <div class="card shadow mx-auto" style="max-width: 700px;">
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Project Type</label>
            <select class="form-select" id="type">
              <option value="1200">Residential House / Villa</option>
              <option value="1800">Commercial Building</option>
              <option value="950">Apartment / Flats</option>
              <option value="850">School / Church</option>
              <option value="2200">Warehouse / Industrial</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Built-up Area (sq.ft)</label>
            <input type="number" id="area" class="form-control" value="2000">
          </div>
        </div>
        <button onclick="calculateCost()" class="btn btn-primary w-100 mt-4">Calculate Estimated Cost</button>
        <div id="result" class="mt-4 text-center fw-bold fs-4"></div>
      </div>
    </div>
    <p class="text-center mt-3 text-muted">This is an approximate cost. Final quote after site visit.</p>
  </div>

  <script>
    function calculateCost() {
      const area = parseFloat(document.getElementById('area').value);
      const rate = parseFloat(document.getElementById('type').value);
      if (!area || area <= 0) {
        alert("Please enter a valid area");
        return;
      }
      const total = Math.round(area * rate);
      document.getElementById('result').innerHTML = `
        <strong>Estimated Total Cost:</strong><br>
        <span style="color:#ff8c00; font-size:1.8rem;">SLE ${total.toLocaleString('en-SL')}</span>
      `;
    }
  </script>
</body>
</html>
